version: "3.9"

services:

  postgres:

    image: postgres:16

    container_name: library-db

    restart: always

    environment:

      POSTGRES_DB: library

      POSTGRES_USER: postgres

      POSTGRES_PASSWORD: password

    ports:

      - "5432:5432"

    volumes:

      - postgres_data:/var/lib/postgresql/data

  api:

    build: .

    container_name: library-api

    ports:

      - "8000:8000"

    depends_on:

      - postgres

    env_file:

      - .env

volumes:

  postgres_data: